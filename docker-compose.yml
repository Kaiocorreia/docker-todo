services:

  web:
    build: ./app
    container_name: todo_web
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://todouser:todopass@db:5432/tododb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: todo_db
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
      POSTGRES_DB: tododb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: todo_adminer
    ports:
      - "8081:8080"
    networks:
      - internal

  portainer:
    image: portainer/portainer-ce:latest
    container_name: todo_portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - internal

volumes:
  db_data:
  portainer_data:

networks:
  internal:
    driver: bridge
